services:
  kafka01:
    image: confluentinc/cp-kafka:latest
    container_name: ml_kafka01
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka01:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka01:9093

      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 20971520
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 10485760

      KAFKA_COMPRESSION_TYPE: gzip
      KAFKA_LOG_CLEANER_ENABLE: true

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_DELETE_TOPICS_ENABLE: true
    restart: unless-stopped
    ports:
      - "29092:29092"
    networks:
      - ml_net

  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-service
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthcheck')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    depends_on:
      kafka01:
        condition: service_healthy
      web-service:
        condition: service_healthy
    restart: on-failure
    environment:
      - ENV_FILE=/run/secrets/env.ml.prod
    volumes:
      - ../ml_logs:/app/ml_logs
      - ../s3_samples:/app/s3_samples
      - ./secrets/certs:/app/secrets/certs:ro
    secrets:
      - env.ml.prod
    ports:
      - "127.0.0.1:8200:8000"
    networks:
      - ml_net
      - api_net

#networks:
#  ml_net:
#    name: ocr_ml_network
#    external: true
#  api_net:
#    name: ocr_web_network
#    external: true

secrets:
  env.ml.prod:
    file: .env.ml.prod